<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Math Game</title>
    <style>
        /* SIMPLE STYLES - SCROLLING WILL WORK */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e3c72;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* SCROLLING IS ENABLED */
            overflow-y: auto;
        }

        .game-box {
            max-width: 800px;
            width: 100%;
            background: #fff9e6;
            border-radius: 50px;
            padding: 30px 25px;
            border: 5px solid #ffb82e;
            box-shadow: 0 20px 0 #6a3e10;
            /* SCROLLING IS ENABLED */
            max-height: none;
            overflow: visible;
        }

        /* SOUND BUTTON */
        .sound-button {
            background: #ff6b6b;
            color: white;
            font-size: 2rem;
            padding: 15px;
            border-radius: 60px;
            border: 5px solid yellow;
            margin-bottom: 20px;
            cursor: pointer;
            text-align: center;
        }

        /* THEME BUTTONS */
        .theme-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .theme-btn {
            padding: 12px 25px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: 4px solid white;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .avengers-btn { background: #e23636; }
        .spider-btn { background: #02458b; }
        .roblox-btn { background: #cc0000; }
        .minecraft-btn { background: #4caf50; }

        /* PHOTO SECTION - THIS WILL WORK */
        .photo-area {
            background: #ffd966;
            padding: 20px;
            border-radius: 100px;
            border: 5px solid #e67e22;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid #f39c12;
            background: white;
            overflow: hidden;
        }

        /* LESEDI'S PHOTO - SIMPLE AND CLEAN */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-text {
            font-size: 2.2rem;
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid #f1c40f;
        }

        /* THEME DISPLAY */
        .theme-show {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.1);
            border-radius: 60px;
        }
        .theme-icon { font-size: 4rem; }
        .theme-title {
            font-size: 2.8rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 60px;
            color: white;
        }

        /* SCORES */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #2b2155;
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 25px;
            color: #ffde9e;
            font-size: 1.8rem;
        }
        .stat-box {
            background: #0d0628;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #ffbb2e;
        }

        /* QUESTION */
        .question-box {
            background: #fee3a2;
            padding: 20px;
            border-radius: 120px;
            border: 6px solid #ff8321;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #a63f0e;
        }
        .question-text {
            font-size: 6rem;
            font-weight: 800;
            color: #1f3a3f;
            text-align: center;
        }

        /* INPUT */
        .input-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .number-input {
            font-size: 3.5rem;
            width: 200px;
            text-align: center;
            border: 6px solid #ff7b2b;
            border-radius: 70px;
            background: #fefad0;
            padding: 5px;
        }
        .ok-button {
            background: #f04f30;
            font-size: 2.8rem;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 10px 0 #952d0c;
            cursor: pointer;
        }

        .message-area {
            font-size: 2.2rem;
            padding: 15px;
            background: #c2e0c2;
            border-radius: 50px;
            margin: 20px 0;
            border: 4px solid #3d9e4b;
            min-height: 90px;
        }
        .next-button {
            background: #2d7f9e;
            font-size: 2.4rem;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 9px 0 #124f66;
            cursor: pointer;
            margin-top: 10px;
        }
        .next-button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="game-box">
        <!-- SOUND BUTTON -->
        <div class="sound-button" id="soundBtn">🔊 TAP HERE FOR SOUND</div>

        <!-- THEME BUTTONS -->
        <div class="theme-buttons">
            <button class="theme-btn avengers-btn" onclick="changeTheme('avengers')">🦸 AVENGERS</button>
            <button class="theme-btn spider-btn" onclick="changeTheme('spider')">🕷️ SPIDER-MAN</button>
            <button class="theme-btn roblox-btn" onclick="changeTheme('roblox')">🎮 ROBLOX</button>
            <button class="theme-btn minecraft-btn" onclick="changeTheme('minecraft')">⛏️ MINECRAFT</button>
        </div>

        <!-- LESEDI'S PHOTO - THIS IS THE PHOTO LINE -->
        <div class="photo-area">
            <div class="photo-frame">
                <img src="lesedi-face.jpg" alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="photo-text">LESEDI ⭐</div>
        </div>

        <!-- THEME DISPLAY -->
        <div class="theme-show">
            <span class="theme-icon" id="themeIcon">🦸</span>
            <div class="theme-title" id="themeTitle" style="background: #e23636;">AVENGERS</div>
        </div>

        <!-- SCORES -->
        <div class="stats">
            <div class="stat-box" id="scoreDisplay">🏆 0</div>
            <div class="stat-box" id="streakDisplay">🔥 0</div>
        </div>

        <!-- QUESTION -->
        <div class="question-box">
            <div class="question-text" id="questionText">2 + 2</div>
        </div>

        <!-- ANSWER -->
        <div class="input-row">
            <input type="number" id="answerInput" class="number-input" placeholder="?">
            <button class="ok-button" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message-area" id="messageBox">Welcome Lesedi! 👋</div>
        <button class="next-button" id="nextBtn" disabled>➡️ NEXT</button>
    </div>

    <script>
        // SUPER SIMPLE CODE - EVERYTHING WILL WORK

        // SOUND SETUP
        let soundEnabled = false;
        let audioCtx = null;
        
        document.getElementById('soundBtn').onclick = function() {
            soundEnabled = true;
            this.innerHTML = '🔊 SOUND READY! 🎉';
            this.style.background = '#2ecc71';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        };

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 340;
            gain.gain.value = 0.15;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playStreak() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.frequency.value = 1046.5;
            gain1.gain.value = 0.2;
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc1.connect(gain1).connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.15);
            
            let osc2 = audioCtx.createOscillator();
            let gain2 = audioCtx.createGain();
            osc2.frequency.value = 1318.5;
            gain2.gain.value = 0.2;
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.connect(gain2).connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.1);
            osc2.stop(audioCtx.currentTime + 0.3);
        }

        // GAME VARIABLES
        let score = 0;
        let streak = 0;
        let currentAnswer = 4;
        let waitingForNext = false;

        // GET ELEMENTS
        const themeIcon = document.getElementById('themeIcon');
        const themeTitle = document.getElementById('themeTitle');
        const questionEl = document.getElementById('questionText');
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const messageEl = document.getElementById('messageBox');
        const scoreEl = document.getElementById('scoreDisplay');
        const streakEl = document.getElementById('streakDisplay');

        // CHANGE THEME
        window.changeTheme = function(theme) {
            document.body.style.background = 
                theme === 'avengers' ? '#1e3c72' :
                theme === 'spider' ? '#1a1a2e' :
                theme === 'roblox' ? '#8b0000' : '#8B5A2B';
            
            if (theme === 'avengers') {
                themeIcon.innerText = '🦸';
                themeTitle.innerText = 'AVENGERS';
                themeTitle.style.background = '#e23636';
                messageEl.innerText = '🦸 Assemble Lesedi!';
            } else if (theme === 'spider') {
                themeIcon.innerText = '🕷️';
                themeTitle.innerText = 'SPIDER-MAN';
                themeTitle.style.background = '#02458b';
                messageEl.innerText = '🕷️ Go Spider-Lesedi!';
            } else if (theme === 'roblox') {
                themeIcon.innerText = '🎮';
                themeTitle.innerText = 'ROBLOX';
                themeTitle.style.background = '#cc0000';
                messageEl.innerText = '🎮 Level up Lesedi!';
            } else if (theme === 'minecraft') {
                themeIcon.innerText = '⛏️';
                themeTitle.innerText = 'MINECRAFT';
                themeTitle.style.background = '#4caf50';
                messageEl.innerText = '⛏️ Craft on Lesedi!';
            }
        };

        // NEW QUESTION
        function newQuestion() {
            let usePlus = Math.random() > 0.5;
            let a, b;
            
            if (usePlus) {
                a = Math.floor(Math.random() * 9) + 2;
                b = Math.floor(Math.random() * 8) + 2;
                currentAnswer = a + b;
                questionEl.innerText = a + ' + ' + b;
            } else {
                a = Math.floor(Math.random() * 8) + 5;
                b = Math.floor(Math.random() * (a-2)) + 2;
                currentAnswer = a - b;
                questionEl.innerText = a + ' - ' + b;
            }
            
            answerInput.value = '';
            waitingForNext = false;
            nextBtn.disabled = true;
            checkBtn.disabled = false;
        }

        // CHECK ANSWER
        checkBtn.onclick = function() {
            if (waitingForNext) {
                messageEl.innerText = '👉 Press NEXT!';
                return;
            }
            
            let val = answerInput.value.trim();
            if (val === '') {
                messageEl.innerText = '🔢 Type a number!';
                return;
            }
            
            let num = Number(val);
            if (isNaN(num)) {
                messageEl.innerText = '❌ Numbers only!';
                return;
            }
            
            if (num === currentAnswer) {
                playCorrect();
                
                streak++;
                score++;
                
                let msg = '✅ CORRECT!';
                if (streak >= 3) {
                    playStreak();
                    msg += ' 🔥 STREAK!';
                }
                messageEl.innerText = msg;
                
                scoreEl.innerText = '🏆 ' + score;
                streakEl.innerText = '🔥 ' + streak;
                
                waitingForNext = true;
                nextBtn.disabled = false;
                checkBtn.disabled = true;
            } else {
                playWrong();
                
                streak = 0;
                streakEl.innerText = '🔥 0';
                messageEl.innerText = '🤔 Try again!';
                answerInput.select();
            }
        };

        // NEXT BUTTON
        nextBtn.onclick = newQuestion;

        // ENTER KEY
        answerInput.onkeypress = function(e) {
            if (e.key === 'Enter') checkBtn.click();
        };

        // START GAME
        newQuestion();
    </script>
</body>
</html>
