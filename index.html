<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Math Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 15px;
            transition: all 0.3s;
        }

        /* SIMPLE THEME BACKGROUNDS */
        body.theme-avengers { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        body.theme-spider { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        body.theme-roblox { background: linear-gradient(135deg, #cc0000, #8b0000); }
        body.theme-minecraft { background: #8B5A2B; }

        .game-box {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 240, 200, 0.98);
            border-radius: 60px;
            box-shadow: 0 20px 0 #6a3e10;
            padding: 30px 25px;
            border: 5px solid #ffb82e;
            text-align: center;
        }

        /* SOUND BUTTON */
        .sound-btn {
            background: #ff6b6b;
            color: white;
            font-size: 2rem;
            padding: 15px;
            border-radius: 60px;
            border: 5px solid yellow;
            margin-bottom: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .sound-btn.ready { background: #2ecc71; }

        /* THEME BUTTONS */
        .theme-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .theme-btn {
            padding: 12px 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: 4px solid white;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .theme-btn.avengers { background: #e23636; }
        .theme-btn.spider { background: #02458b; }
        .theme-btn.roblox { background: #cc0000; }
        .theme-btn.minecraft { background: #4caf50; }

        /* PHOTO SECTION - SIMPLE AND CLEAN */
        .photo-section {
            background: #ffd966;
            padding: 20px;
            border-radius: 100px;
            border: 5px solid #e67e22;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* PHOTO FRAME - GUARANTEED TO WORK */
        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid #f39c12;
            background: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LESEDI'S PHOTO - THIS WILL WORK */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-name {
            font-size: 2.2rem;
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid #f1c40f;
        }

        /* THEME DISPLAY */
        .theme-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.1);
            border-radius: 60px;
        }
        .theme-icon { font-size: 4rem; }
        .theme-name {
            font-size: 2.8rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 60px;
            color: white;
            text-shadow: 3px 3px 0 black;
        }

        /* SCORES */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #2b2155;
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 25px;
            color: #ffde9e;
            font-size: 1.8rem;
        }
        .score-box {
            background: #0d0628;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #ffbb2e;
        }

        /* MATH QUESTION */
        .question-box {
            background: #fee3a2;
            padding: 20px;
            border-radius: 120px;
            border: 6px solid #ff8321;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #a63f0e;
        }
        .equation {
            font-size: 6rem;
            font-weight: 800;
            color: #1f3a3f;
            text-shadow: 5px 5px 0 #f5b457;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .answer-input {
            font-size: 3.5rem;
            width: 200px;
            text-align: center;
            border: 6px solid #ff7b2b;
            border-radius: 70px;
            background: #fefad0;
            padding: 5px;
        }
        .check-btn {
            background: #f04f30;
            font-size: 2.8rem;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 10px 0 #952d0c;
            cursor: pointer;
        }
        .check-btn:active { transform: translateY(7px); }

        .message {
            font-size: 2.2rem;
            padding: 15px;
            background: #c2e0c2;
            border-radius: 50px;
            margin: 20px 0;
            border: 4px solid #3d9e4b;
            min-height: 90px;
        }
        .next-btn {
            background: #2d7f9e;
            font-size: 2.4rem;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 9px 0 #124f66;
            cursor: pointer;
        }
        .next-btn:disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="theme-avengers" id="mainBody">
    <div class="game-box">
        <!-- SOUND BUTTON -->
        <div class="sound-btn" id="soundBtn">🔊 TAP HERE FOR SOUND</div>

        <!-- THEME BUTTONS -->
        <div class="theme-row">
            <button class="theme-btn avengers" data-theme="avengers">🦸 AVENGERS</button>
            <button class="theme-btn spider" data-theme="spider">🕷️ SPIDER-MAN</button>
            <button class="theme-btn roblox" data-theme="roblox">🎮 ROBLOX</button>
            <button class="theme-btn minecraft" data-theme="minecraft">⛏️ MINECRAFT</button>
        </div>

        <!-- LESEDI'S PHOTO - GUARANTEED TO WORK -->
        <div class="photo-section">
            <div class="photo-frame">
                <!-- THIS IS THE PHOTO LINE - IT WILL WORK NOW -->
                <img src="lesedi-face.jpg" alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="photo-name">LESEDI ⭐</div>
        </div>

        <!-- THEME HEADER -->
        <div class="theme-display">
            <span class="theme-icon" id="themeIcon">🦸</span>
            <div class="theme-name" id="themeName" style="background: #e23636;">AVENGERS</div>
        </div>

        <!-- SCORES -->
        <div class="stats">
            <div class="score-box" id="scoreDisplay">🏆 0</div>
            <div class="score-box" id="streakDisplay">🔥 0</div>
        </div>

        <!-- MATH QUESTION -->
        <div class="question-box">
            <div class="equation" id="questionText">2 + 2</div>
        </div>

        <!-- ANSWER AREA -->
        <div class="input-area">
            <input type="number" id="answerInput" class="answer-input" placeholder="?">
            <button class="check-btn" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message" id="messageBox">Choose a theme to begin!</div>
        <button class="next-btn" id="nextBtn" disabled>➡️ Next</button>
    </div>

    <script>
        // SIMPLE AND CLEAN - PHOTO WILL WORK
        (function() {
            // Sound setup
            let soundsOn = false;
            let correct, wrong, streak;
            
            document.getElementById('soundBtn').onclick = function() {
                soundsOn = true;
                this.innerHTML = '🔊 SOUNDS READY! 🎉';
                this.style.background = '#2ecc71';
                
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                correct = function() {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.value = 880;
                    g.gain.value = 0.2;
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    o.connect(g).connect(ctx.destination);
                    o.start();
                    o.stop(ctx.currentTime + 0.3);
                };
                
                wrong = function() {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.value = 340;
                    g.gain.value = 0.15;
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    o.connect(g).connect(ctx.destination);
                    o.start();
                    o.stop(ctx.currentTime + 0.25);
                };
                
                streak = function() {
                    const o1 = ctx.createOscillator();
                    const g1 = ctx.createGain();
                    o1.frequency.value = 1046.5;
                    g1.gain.value = 0.2;
                    g1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    o1.connect(g1).connect(ctx.destination);
                    o1.start();
                    o1.stop(ctx.currentTime + 0.15);
                    
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.frequency.value = 1318.5;
                    g2.gain.value = 0.2;
                    g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    o2.connect(g2).connect(ctx.destination);
                    o2.start(ctx.currentTime + 0.1);
                    o2.stop(ctx.currentTime + 0.3);
                };
            };

            // Game variables
            let score = 0;
            let streakCount = 0;
            let currentQuestion = { text: '2 + 2', answer: 4 };
            let awaitingNext = false;

            // DOM elements
            const body = document.getElementById('mainBody');
            const themeIcon = document.getElementById('themeIcon');
            const themeName = document.getElementById('themeName');
            const question = document.getElementById('questionText');
            const answer = document.getElementById('answerInput');
            const check = document.getElementById('checkBtn');
            const next = document.getElementById('nextBtn');
            const message = document.getElementById('messageBox');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const streakDisplay = document.getElementById('streakDisplay');

            // Theme function
            window.applyTheme = function(theme) {
                body.className = `theme-${theme}`;
                
                if (theme === 'avengers') {
                    themeIcon.innerText = '🦸';
                    themeName.innerText = 'AVENGERS';
                    themeName.style.background = '#e23636';
                    message.innerText = '🦸 Assemble, Lesedi!';
                } else if (theme === 'spider') {
                    themeIcon.innerText = '🕷️';
                    themeName.innerText = 'SPIDER-MAN';
                    themeName.style.background = '#02458b';
                    message.innerText = '🕷️ Go, Spider-Lesedi!';
                } else if (theme === 'roblox') {
                    themeIcon.innerText = '🎮';
                    themeName.innerText = 'ROBLOX';
                    themeName.style.background = '#cc0000';
                    message.innerText = '🎮 Level up, Lesedi!';
                } else if (theme === 'minecraft') {
                    themeIcon.innerText = '⛏️';
                    themeName.innerText = 'MINECRAFT';
                    themeName.style.background = '#4caf50';
                    message.innerText = '⛏️ Craft on, Lesedi!';
                }
            };

            // Theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.onclick = () => applyTheme(btn.dataset.theme);
            });

            // Generate question
            function newQuestion() {
                let a, b;
                if (Math.random() > 0.5) {
                    a = Math.floor(Math.random() * 9) + 2;
                    b = Math.floor(Math.random() * 8) + 2;
                    currentQuestion = { text: `${a} + ${b}`, answer: a + b };
                } else {
                    a = Math.floor(Math.random() * 8) + 5;
                    b = Math.floor(Math.random() * (a-2)) + 2;
                    currentQuestion = { text: `${a} - ${b}`, answer: a - b };
                }
                question.innerText = currentQuestion.text;
                answer.value = '';
                awaitingNext = false;
                next.disabled = true;
                check.disabled = false;
            }

            // Check answer
            check.onclick = function() {
                if (awaitingNext) {
                    message.innerText = '👉 Press NEXT!';
                    return;
                }
                
                let val = answer.value.trim();
                if (val === '') {
                    message.innerText = '🔢 Type a number!';
                    return;
                }
                
                let num = Number(val);
                if (isNaN(num)) {
                    message.innerText = '❌ Numbers only!';
                    return;
                }
                
                if (num === currentQuestion.answer) {
                    if (soundsOn) correct();
                    
                    streakCount++;
                    score++;
                    
                    let msg = '✅ CORRECT!';
                    if (streakCount >= 3) {
                        if (soundsOn) streak();
                        msg += ' 🔥 STREAK!';
                    }
                    message.innerText = msg;
                    
                    scoreDisplay.innerText = `🏆 ${score}`;
                    streakDisplay.innerText = `🔥 ${streakCount}`;
                    
                    awaitingNext = true;
                    next.disabled = false;
                    check.disabled = true;
                } else {
                    if (soundsOn) wrong();
                    
                    streakCount = 0;
                    streakDisplay.innerText = `🔥 0`;
                    message.innerText = '🤔 Try again!';
                    answer.select();
                }
            };

            // Next button
            next.onclick = newQuestion;

            // Enter key
            answer.onkeypress = function(e) {
                if (e.key === 'Enter') check.click();
            };

            // Start game
            newQuestion();
            applyTheme('avengers');
        })();
    </script>
</body>
</html>
