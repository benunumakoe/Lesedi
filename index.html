<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Math · Avengers · Spider-Man · Roblox · Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 15px;
            transition: all 0.3s;
        }

        /* ===== THEMES ===== */
        body.theme-avengers {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            position: relative;
            overflow: hidden;
        }
        body.theme-avengers::before {
            content: "🦸 🦸 🦸";
            font-size: 100px;
            position: absolute;
            opacity: 0.1;
            transform: rotate(-15deg);
            bottom: 10px;
            right: 10px;
        }

        body.theme-spider {
            background: linear-gradient(45deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
        }
        body.theme-spider::before {
            content: "🕷️ 🕸️ 🕷️ 🕸️";
            font-size: 70px;
            position: absolute;
            opacity: 0.2;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        body.theme-roblox {
            background: linear-gradient(135deg, #cc0000 0%, #8b0000 100%);
            position: relative;
        }
        body.theme-roblox::before {
            content: "🔲 🔳 🔲 🔳";
            font-size: 80px;
            position: absolute;
            opacity: 0.15;
            top: 20px;
            left: 20px;
            transform: rotate(5deg);
        }
        body.theme-roblox::after {
            content: "🎮 🎮 🎮";
            font-size: 90px;
            position: absolute;
            opacity: 0.1;
            bottom: 30px;
            right: 30px;
            transform: rotate(-10deg);
        }

        body.theme-minecraft {
            background: #8B5A2B;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.1) 2px, transparent 2px),
                linear-gradient(rgba(139, 69, 19, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 69, 19, 0.5) 1px, transparent 1px);
            background-size: 40px 40px, 40px 40px, 20px 20px, 20px 20px;
            position: relative;
        }
        body.theme-minecraft::before {
            content: "⛏️ ⛏️ ⛏️";
            font-size: 70px;
            position: absolute;
            opacity: 0.2;
            bottom: 20px;
            left: 20px;
        }

        .game-box {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 240, 200, 0.97);
            backdrop-filter: blur(5px);
            border-radius: 70px;
            box-shadow: 0 20px 0 #6a3e10, 0 30px 40px rgba(0,0,0,0.6);
            padding: 30px 25px 40px;
            border: 5px solid #ffb82e;
            text-align: center;
            position: relative;
            z-index: 100;
        }

        /* sound activator */
        .sound-activator {
            background: #ff6b6b;
            color: white;
            font-size: 2rem;
            padding: 15px;
            border-radius: 60px;
            border: 5px solid yellow;
            margin-bottom: 20px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            font-weight: bold;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: #ff4141; }
        }

        /* theme buttons */
        .theme-chooser {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .theme-btn {
            padding: 12px 25px;
            font-size: 1.6rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            border: 4px solid white;
        }
        .theme-btn.avengers { 
            background: #e23636; 
            color: white;
            box-shadow: 0 6px 0 #962020;
        }
        .theme-btn.spider { 
            background: #02458b; 
            color: white;
            box-shadow: 0 6px 0 #012a54;
        }
        .theme-btn.roblox { 
            background: #cc0000; 
            color: white;
            box-shadow: 0 6px 0 #8b0000;
        }
        .theme-btn.minecraft { 
            background: #4caf50; 
            color: white;
            box-shadow: 0 6px 0 #2e7d32;
        }
        .theme-btn:active { transform: translateY(5px); }

        /* PHOTO SECTION - YOUR PHOTO IS HERE */
        .photo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #ffd966;
            padding: 15px;
            border-radius: 130px;
            margin-bottom: 20px;
            border: 5px solid #e67e22;
        }

        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid #f39c12;
            box-shadow: 0 0 0 5px #c0392b, 0 10px 0 #6d2c1f;
            overflow: hidden;
            background: white;
        }
        /* LESEDI'S PHOTO - FIXED RIGHT HERE */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-label {
            font-size: 2rem;
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid #f1c40f;
        }

        /* theme header */
        .theme-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
        }
        .character-icon {
            font-size: 4rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        .theme-logo {
            font-size: 3rem;
            font-weight: bold;
            padding: 10px 35px;
            border-radius: 60px;
            color: white;
            text-shadow: 3px 3px 0 #000;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #2b2155;
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 25px;
            color: #ffde9e;
            font-size: 1.8rem;
        }
        .score, .streak {
            background: #0d0628;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #ffbb2e;
        }

        .question-card {
            background: #fee3a2;
            padding: 20px;
            border-radius: 120px;
            border: 6px solid #ff8321;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #a63f0e;
        }
        .big-equation {
            font-size: 6rem;
            font-weight: 800;
            color: #1f3a3f;
            text-shadow: 5px 5px 0 #f5b457;
        }

        .input-area {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .answer-input {
            font-size: 3.5rem;
            width: 210px;
            text-align: center;
            border: 6px solid #ff7b2b;
            border-radius: 70px;
            background: #fefad0;
            padding: 5px 15px;
            box-shadow: 0 9px 0 #a3510e;
        }
        .check-btn {
            background: #f04f30;
            font-size: 2.8rem;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 10px 0 #952d0c;
            cursor: pointer;
            border: 4px solid #ffbc6e;
        }
        .check-btn:active { transform: translateY(7px); }

        .message {
            font-size: 2.2rem;
            padding: 15px;
            background: #c2e0c2;
            border-radius: 50px;
            margin: 20px 0;
            border: 4px solid #3d9e4b;
            min-height: 90px;
        }
        .next-btn {
            background: #2d7f9e;
            font-size: 2.4rem;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 9px 0 #124f66;
            cursor: pointer;
        }
        .next-btn:disabled { opacity: 0.5; pointer-events: none; }
        footer { margin-top: 20px; font-size: 1.8rem; color: #cc6d1c; }
    </style>
</head>
<body class="theme-avengers" id="mainBody">
    <div class="game-box">
        <div class="sound-activator" id="soundButton">
            🔊 TAP HERE FOR SOUND! 🔊
        </div>

        <!-- theme buttons - NO PAW PATROL, NOW ROBLOX -->
        <div class="theme-chooser">
            <button class="theme-btn avengers" data-theme="avengers">🦸 AVENGERS</button>
            <button class="theme-btn spider" data-theme="spider">🕷️ SPIDER-MAN</button>
            <button class="theme-btn roblox" data-theme="roblox">🎮 ROBLOX</button>
            <button class="theme-btn minecraft" data-theme="minecraft">⛏️ MINECRAFT</button>
        </div>

        <!-- PHOTO SECTION - LESEDI'S PHOTO IS RIGHT HERE -->
        <div class="photo-section">
            <div class="photo-frame">
                <!-- LESEDI'S PHOTO - FIXED AND SAFE -->
                <img src="lesedi-face.jpg" alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="photo-label">
                LESEDI ⭐
            </div>
        </div>

        <!-- theme header -->
        <div class="theme-header">
            <span class="character-icon" id="characterIcon">🦸</span>
            <div class="theme-logo" id="themeLogo">AVENGERS</div>
        </div>

        <!-- score -->
        <div class="stats">
            <div class="score" id="scoreDisplay">🏆 0</div>
            <div class="streak" id="streakDisplay">🔥 0</div>
        </div>

        <!-- math question -->
        <div class="question-card">
            <div class="big-equation" id="questionText">2 + 2</div>
        </div>

        <!-- answer area -->
        <div class="input-area">
            <input type="number" id="answerInput" class="answer-input" placeholder="?" inputmode="numeric">
            <button class="check-btn" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message" id="messageBox">🎮 Choose a theme to begin!</div>
        <button class="next-btn" id="nextBtn" disabled> ➡️ Next</button>
        <footer>✨ Lesedi's math adventure ✨</footer>
    </div>

    <script>
        (function() {
            // Sounds
            let soundsEnabled = false;
            const soundButton = document.getElementById('soundButton');
            
            let correctSound, wrongSound, streakSound;

            function enableSounds() {
                if (soundsEnabled) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioContext();
                    
                    correctSound = function() {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = 880;
                        gain.gain.value = 0.2;
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    };
                    
                    wrongSound = function() {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.value = 340;
                        gain.gain.value = 0.15;
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.25);
                    };
                    
                    streakSound = function() {
                        const osc1 = ctx.createOscillator();
                        const gain1 = ctx.createGain();
                        osc1.frequency.value = 1046.5;
                        gain1.gain.value = 0.2;
                        gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        osc1.connect(gain1);
                        gain1.connect(ctx.destination);
                        osc1.start();
                        osc1.stop(ctx.currentTime + 0.15);
                        
                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.frequency.value = 1318.5;
                        gain2.gain.value = 0.2;
                        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.start(ctx.currentTime + 0.1);
                        osc2.stop(ctx.currentTime + 0.3);
                    };
                    
                    soundsEnabled = true;
                    soundButton.style.background = '#2ecc71';
                    soundButton.innerHTML = '🔊 SOUNDS READY! 🎉';
                    if (ctx.state === 'suspended') ctx.resume();
                } catch (e) {}
            }

            soundButton.addEventListener('click', enableSounds);
            soundButton.addEventListener('touchstart', enableSounds);

            // Game state
            let currentQuestion = { text: '2 + 2', answer: 4 };
            let score = 0;
            let streak = 0;
            let awaitingNext = false;

            // DOM elements
            const bodyEl = document.getElementById('mainBody');
            const themeLogo = document.getElementById('themeLogo');
            const characterIcon = document.getElementById('characterIcon');
            const questionEl = document.getElementById('questionText');
            const answerInput = document.getElementById('answerInput');
            const checkBtn = document.getElementById('checkBtn');
            const nextBtn = document.getElementById('nextBtn');
            const messageBox = document.getElementById('messageBox');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const streakDisplay = document.getElementById('streakDisplay');

            // ===== THEMES: AVENGERS, SPIDER-MAN, ROBLOX, MINECRAFT =====
            function applyTheme(themeId) {
                bodyEl.className = `theme-${themeId}`;
                
                if (themeId === 'avengers') {
                    characterIcon.innerText = '🦸';
                    themeLogo.innerText = 'AVENGERS';
                    themeLogo.style.background = '#e23636';
                    messageBox.innerText = '🦸 Assemble, Lesedi! Earth\'s mightiest math hero!';
                }
                else if (themeId === 'spider') {
                    characterIcon.innerText = '🕷️';
                    themeLogo.innerText = 'SPIDER-MAN';
                    themeLogo.style.background = '#02458b';
                    messageBox.innerText = '🕷️ With great math comes great responsibility!';
                }
                else if (themeId === 'roblox') {
                    characterIcon.innerText = '🎮';
                    themeLogo.innerText = 'ROBLOX';
                    themeLogo.style.background = '#cc0000';
                    messageBox.innerText = '🎮 Level up your math skills, Lesedi!';
                }
                else if (themeId === 'minecraft') {
                    characterIcon.innerText = '⛏️';
                    themeLogo.innerText = 'MINECRAFT';
                    themeLogo.style.background = '#4caf50';
                    messageBox.innerText = '⛏️ Craft your answers carefully!';
                }
            }

            // Theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    applyTheme(e.target.dataset.theme);
                });
            });

            // Generate question
            function generateQuestion() {
                const plus = Math.random() > 0.5;
                if (plus) {
                    let a = Math.floor(Math.random() * 9) + 2;
                    let b = Math.floor(Math.random() * 8) + 2;
                    return { text: `${a} + ${b}`, answer: a + b };
                } else {
                    let a = Math.floor(Math.random() * 8) + 5;
                    let b = Math.floor(Math.random() * (a-2)) + 2;
                    return { text: `${a} - ${b}`, answer: a - b };
                }
            }

            function newQuestion() {
                let q = generateQuestion();
                currentQuestion = q;
                questionEl.innerText = q.text;
                answerInput.value = '';
                awaitingNext = false;
                nextBtn.disabled = true;
                checkBtn.disabled = false;
            }

            function updateScore() {
                scoreDisplay.innerText = `🏆 ${score}`;
                streakDisplay.innerText = `🔥 ${streak}`;
            }

            // Check answer with theme messages
            function checkAnswer() {
                if (awaitingNext) {
                    messageBox.innerText = '👉 Press NEXT!';
                    return;
                }
                
                let val = answerInput.value.trim();
                if (val === '') {
                    messageBox.innerText = '🔢 Type a number!';
                    return;
                }
                
                let num = Number(val);
                if (isNaN(num)) {
                    messageBox.innerText = '❌ Numbers only!';
                    return;
                }
                
                if (num === currentQuestion.answer) {
                    // CORRECT!
                    if (soundsEnabled && correctSound) correctSound();
                    
                    streak++;
                    score++;
                    
                    // Theme-specific correct messages
                    let msg = '';
                    const theme = bodyEl.className.replace('theme-', '');
                    
                    if (theme === 'avengers') msg = '✅ AVENGERS ASSEMBLE! Perfect!';
                    else if (theme === 'spider') msg = '✅ SPECTACULAR SPIDER-MATH!';
                    else if (theme === 'roblox') msg = '✅ ROBLOX LEVEL UP! +100 points!';
                    else if (theme === 'minecraft') msg = '✅ CRAFT-Y calculation! +1 emerald!';
                    
                    if (streak >= 3) {
                        if (soundsEnabled && streakSound) streakSound();
                        if (theme === 'avengers') msg += ' 🔥 AVENGERS STREAK!';
                        else if (theme === 'spider') msg += ' 🔥 SPIDER-STREAK!';
                        else if (theme === 'roblox') msg += ' 🔥 ROBLOX PRO STREAK!';
                        else if (theme === 'minecraft') msg += ' 🔥 DIAMOND STREAK!';
                    }
                    messageBox.innerText = msg;
                    
                    awaitingNext = true;
                    nextBtn.disabled = false;
                    checkBtn.disabled = true;
                } else {
                    // WRONG
                    if (soundsEnabled && wrongSound) wrongSound();
                    
                    streak = 0;
                    
                    // Theme-specific wrong messages
                    const theme = bodyEl.className.replace('theme-', '');
                    
                    if (theme === 'avengers') messageBox.innerText = '🤔 Even Hulk had to try again!';
                    else if (theme === 'spider') messageBox.innerText = '🤔 My spider-sense says... try again!';
                    else if (theme === 'roblox') messageBox.innerText = '🤔 Game over? Try again! New level!';
                    else if (theme === 'minecraft') messageBox.innerText = '🤔 Oops! Craft another answer!';
                    
                    answerInput.select();
                }
                
                updateScore();
            }

            // Event listeners
            checkBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', newQuestion);
            
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAnswer();
            });

            // Initialize
            newQuestion();
            updateScore();
            applyTheme('avengers');
        })();
    </script>
</body>
</html>
