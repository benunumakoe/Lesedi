<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Math Game · with photo + sounds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1f2f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 15px;
        }

        body.theme-avengers { background: radial-gradient(circle at 20% 30%, #1b294a 0%, #0a0f1f 100%); }
        body.theme-spider { background: linear-gradient(145deg, #0a1f3b 0%, #2b1e3c 100%); }
        body.theme-pawpatrol { background: linear-gradient(135deg, #3b9ae1 0%, #faca2e 100%); }
        body.theme-minecraft { background: #6b4f3c; background-image: linear-gradient(rgba(140,200,80,0.2) 2px, transparent 2px), linear-gradient(90deg, rgba(140,200,80,0.2) 2px, transparent 2px); background-size: 40px 40px; }

        .game-box {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 240, 200, 0.95);
            border-radius: 70px;
            box-shadow: 0 20px 0 #6a3e10, 0 30px 40px rgba(0,0,0,0.6);
            padding: 30px 25px 40px;
            border: 5px solid #ffb82e;
            text-align: center;
        }

        /* sound activator - big and obvious */
        .sound-activator {
            background: #ff6b6b;
            color: white;
            font-size: 2rem;
            padding: 15px;
            border-radius: 60px;
            border: 5px solid yellow;
            margin-bottom: 20px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            font-weight: bold;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: #ff4141; }
        }

        .theme-chooser {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .theme-btn {
            padding: 8px 20px;
            font-size: 1.4rem;
            border-radius: 50px;
            border: 4px solid #ffbb2e;
            background: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #a7581c;
        }
        .theme-btn:active { transform: translateY(5px); }

        /* PHOTO AREA - SUPER CLEAR */
        .photo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #ffd966;
            padding: 15px;
            border-radius: 130px;
            margin-bottom: 20px;
            border: 5px solid #e67e22;
        }

        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid #f39c12;
            box-shadow: 0 0 0 5px #c0392b, 0 10px 0 #6d2c1f;
            overflow: hidden;
            background: white;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-instruction {
            font-size: 1.8rem;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: 4px solid #f1c40f;
        }
        .photo-instruction small {
            font-size: 1.2rem;
            display: block;
            color: #ffe066;
        }

        .theme-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: #e62529;
            color: white;
            padding: 8px 30px;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #2b2155;
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 25px;
            color: #ffde9e;
            font-size: 1.8rem;
        }
        .score, .streak {
            background: #0d0628;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #ffbb2e;
        }

        .question-card {
            background: #fee3a2;
            padding: 20px;
            border-radius: 120px;
            border: 6px solid #ff8321;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #a63f0e;
        }
        .big-equation {
            font-size: 6rem;
            font-weight: 800;
            color: #1f3a3f;
            text-shadow: 5px 5px 0 #f5b457;
        }

        .input-area {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .answer-input {
            font-size: 3.5rem;
            width: 210px;
            text-align: center;
            border: 6px solid #ff7b2b;
            border-radius: 70px;
            background: #fefad0;
            padding: 5px 15px;
            box-shadow: 0 9px 0 #a3510e;
        }
        .check-btn {
            background: #f04f30;
            font-size: 2.8rem;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 10px 0 #952d0c;
            cursor: pointer;
            border: 4px solid #ffbc6e;
        }
        .check-btn:active { transform: translateY(7px); }

        .message {
            font-size: 2.2rem;
            padding: 15px;
            background: #c2e0c2;
            border-radius: 50px;
            margin: 20px 0;
            border: 4px solid #3d9e4b;
        }
        .next-btn {
            background: #2d7f9e;
            font-size: 2.4rem;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            border: none;
            box-shadow: 0 9px 0 #124f66;
            cursor: pointer;
        }
        .next-btn:disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="theme-avengers" id="mainBody">
    <div class="game-box">
        <!-- BIG SOUND ACTIVATOR BUTTON - TAP THIS FIRST! -->
        <div class="sound-activator" id="soundButton">
            🔊 TAP HERE FIRST FOR SOUND! 🔊
        </div>

        <!-- theme buttons -->
        <div class="theme-chooser">
            <button class="theme-btn" data-theme="avengers">🦸 Avengers</button>
            <button class="theme-btn" data-theme="spider">🕷️ Spider-Man</button>
            <button class="theme-btn" data-theme="pawpatrol">🐾 Paw Patrol</button>
            <button class="theme-btn" data-theme="minecraft">⛏️ Minecraft</button>
        </div>

        <!-- PHOTO SECTION - WITH SIMPLE IMAGE TAG -->
        <div class="photo-section">
            <div class="photo-frame">
                <!-- JUST THIS LINE - REPLACE WITH LESEDI'S PHOTO -->
                <img src="lesedi-face.jpg" alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="photo-instruction">
                👆 LESEDI'S PHOTO<br>
                <small>Just save photo as "lesedi.jpg" in same folder</small>
            </div>
        </div>

        <!-- theme logo -->
        <div class="theme-logo" id="themeLogo">AVENGERS</div>

        <!-- score -->
        <div class="stats">
            <div class="score" id="scoreDisplay">🏆 0</div>
            <div class="streak" id="streakDisplay">🔥 0</div>
        </div>

        <!-- math question -->
        <div class="question-card">
            <div class="big-equation" id="questionText">2 + 2</div>
        </div>

        <!-- answer area -->
        <div class="input-area">
            <input type="number" id="answerInput" class="answer-input" placeholder="?" inputmode="numeric">
            <button class="check-btn" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message" id="messageBox">🦸 Tap the sound button first!</div>
        <button class="next-btn" id="nextBtn" disabled> ➡️ Next</button>
    </div>

    <script>
        (function() {
            // ----- SIMPLE SOUND SETUP -----
            let soundsEnabled = false;
            const soundButton = document.getElementById('soundButton');
            
            // Create audio contexts only after button click
            let correctSound = null;
            let wrongSound = null;
            let streakSound = null;

            function enableSounds() {
                if (soundsEnabled) return;
                
                try {
                    // Create simple audio using Web Audio API
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioContext();
                    
                    // Correct sound function
                    correctSound = function() {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = 880;
                        gain.gain.value = 0.2;
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    };
                    
                    // Wrong sound function
                    wrongSound = function() {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.value = 340;
                        gain.gain.value = 0.15;
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.25);
                    };
                    
                    // Streak sound (two notes)
                    streakSound = function() {
                        const osc1 = ctx.createOscillator();
                        const gain1 = ctx.createGain();
                        osc1.frequency.value = 1046.5;
                        gain1.gain.value = 0.2;
                        gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        osc1.connect(gain1);
                        gain1.connect(ctx.destination);
                        osc1.start();
                        osc1.stop(ctx.currentTime + 0.15);
                        
                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.frequency.value = 1318.5;
                        gain2.gain.value = 0.2;
                        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.start(ctx.currentTime + 0.1);
                        osc2.stop(ctx.currentTime + 0.3);
                    };
                    
                    soundsEnabled = true;
                    soundButton.style.background = '#2ecc71';
                    soundButton.innerHTML = '🔊 SOUNDS ARE READY! 🎉';
                    soundButton.style.animation = 'none';
                    
                    // Resume audio context (required for Chrome)
                    if (ctx.state === 'suspended') ctx.resume();
                    
                } catch (e) {
                    console.log('Sound error:', e);
                }
            }

            soundButton.addEventListener('click', enableSounds);
            soundButton.addEventListener('touchstart', enableSounds);

            // Game state
            let currentQuestion = { text: '2 + 2', answer: 4 };
            let score = 0;
            let streak = 0;
            let awaitingNext = false;

            // DOM elements
            const bodyEl = document.getElementById('mainBody');
            const themeLogo = document.getElementById('themeLogo');
            const questionEl = document.getElementById('questionText');
            const answerInput = document.getElementById('answerInput');
            const checkBtn = document.getElementById('checkBtn');
            const nextBtn = document.getElementById('nextBtn');
            const messageBox = document.getElementById('messageBox');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const streakDisplay = document.getElementById('streakDisplay');

            // Theme switching
            function applyTheme(themeId) {
                bodyEl.className = `theme-${themeId}`;
                if (themeId === 'avengers') themeLogo.innerText = 'AVENGERS';
                else if (themeId === 'spider') themeLogo.innerText = 'SPIDER-MAN';
                else if (themeId === 'pawpatrol') themeLogo.innerText = 'PAW PATROL';
                else if (themeId === 'minecraft') themeLogo.innerText = 'MINECRAFT';
                
                themeLogo.style.background = themeId === 'spider' ? '#e63946' : 
                                            themeId === 'pawpatrol' ? '#f5d742' : 
                                            themeId === 'minecraft' ? '#6b8f4c' : '#e62529';
            }

            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    applyTheme(e.target.dataset.theme);
                });
            });

            // Generate question
            function generateQuestion() {
                const plus = Math.random() > 0.5;
                if (plus) {
                    let a = Math.floor(Math.random() * 9) + 2;
                    let b = Math.floor(Math.random() * 8) + 2;
                    return { text: `${a} + ${b}`, answer: a + b };
                } else {
                    let a = Math.floor(Math.random() * 8) + 5;
                    let b = Math.floor(Math.random() * (a-2)) + 2;
                    return { text: `${a} - ${b}`, answer: a - b };
                }
            }

            function newQuestion() {
                let q = generateQuestion();
                currentQuestion = q;
                questionEl.innerText = q.text;
                answerInput.value = '';
                awaitingNext = false;
                nextBtn.disabled = true;
                checkBtn.disabled = false;
            }

            function updateScore() {
                scoreDisplay.innerText = `🏆 ${score}`;
                streakDisplay.innerText = `🔥 ${streak}`;
            }

            // Check answer
            function checkAnswer() {
                if (awaitingNext) {
                    messageBox.innerText = '👉 Press NEXT!';
                    return;
                }
                
                let val = answerInput.value.trim();
                if (val === '') {
                    messageBox.innerText = '🔢 Type a number!';
                    return;
                }
                
                let num = Number(val);
                if (isNaN(num)) {
                    messageBox.innerText = '❌ Numbers only!';
                    return;
                }
                
                if (num === currentQuestion.answer) {
                    // CORRECT!
                    if (soundsEnabled && correctSound) correctSound();
                    
                    streak++;
                    score++;
                    
                    let msg = '✅ CORRECT!';
                    if (streak >= 3) {
                        if (soundsEnabled && streakSound) streakSound();
                        msg += ' 🔥 STREAK!';
                    }
                    messageBox.innerText = msg;
                    
                    awaitingNext = true;
                    nextBtn.disabled = false;
                    checkBtn.disabled = true;
                } else {
                    // WRONG
                    if (soundsEnabled && wrongSound) wrongSound();
                    
                    streak = 0;
                    messageBox.innerText = '🤔 Try again!';
                    answerInput.select();
                }
                
                updateScore();
            }

            // Event listeners
            checkBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', newQuestion);
            
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAnswer();
            });

            // Initialize
            newQuestion();
            updateScore();
            applyTheme('avengers');
        })();
    </script>
</body>
</html>
