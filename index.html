<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Theme Math · Spider-Man · Paw Patrol · Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1f2f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
            padding: 15px;
            transition: background 0.4s;
        }

        /* theme backgrounds will be toggled via js */
        body.theme-avengers {
            background: radial-gradient(circle at 20% 30%, #1b294a 0%, #0a0f1f 100%);
        }
        body.theme-spider {
            background: linear-gradient(145deg, #0a1f3b 0%, #2b1e3c 100%), radial-gradient(circle at 70% 20%, #e63946 5px, transparent 5px);
            background-blend-mode: overlay;
        }
        body.theme-pawpatrol {
            background: linear-gradient(135deg, #3b9ae1 0%, #faca2e 100%);
        }
        body.theme-minecraft {
            background: #6b4f3c;
            background-image: linear-gradient(rgba(140, 200, 80, 0.2) 2px, transparent 2px),
                              linear-gradient(90deg, rgba(140, 200, 80, 0.2) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .game-box {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 240, 200, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 70px 70px 45px 45px;
            box-shadow: 0 20px 0 #6a3e10, 0 30px 40px rgba(0,0,0,0.6), 0 0 0 6px #ffc857;
            padding: 30px 25px 40px 25px;
            border: 5px solid #ffb82e;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* ----- THEME SELECTOR ROW ----- */
        .theme-chooser {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .theme-btn {
            padding: 10px 25px;
            font-size: 1.6rem;
            border-radius: 50px;
            border: 4px solid #ffbb2e;
            background: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #a7581c;
            transition: 0.05s linear;
            font-family: 'Comic Sans MS', cursive;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .theme-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #a7581c;
        }
        .theme-btn.spider { background: #e63946; color: white; text-shadow: 2px 2px 0 #540d13; }
        .theme-btn.paw { background: #f5d742; color: #1e4f8a; }
        .theme-btn.minecraft { background: #6b8f4c; color: white; text-shadow: 3px 3px 0 #2d471b; }
        .theme-btn.avengers { background: #1f2c56; color: #f5c542; }

        /* photo area same as before */
        .avengers-photo-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #1f2c56, #0e1a42);
            border-radius: 120px;
            padding: 10px 15px 10px 10px;
            border: 5px solid #f5c542;
            box-shadow: 0 8px 0 #b6560a;
            margin-bottom: 25px;
            gap: 10px;
            transition: all 0.3s;
        }
        .photo-frame {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background: #ffe1b3;
            border: 6px solid #feda75;
            box-shadow: 0 0 0 5px #aa2b1d, 0 8px 0 #5c1e0f;
            overflow: hidden;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .theme-logo {
            font-size: 2.3rem;
            font-weight: bold;
            background: #e62529;
            color: white;
            padding: 8px 30px;
            border-radius: 60px;
            border: 4px solid #fed54b;
            text-shadow: 3px 3px 0 #750e10;
            white-space: nowrap;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #2b2155;
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 25px;
            border: 4px solid #f6b83e;
            font-size: 1.8rem;
            color: #ffde9e;
            box-shadow: 0 7px 0 #4d2b0f;
        }
        .score, .streak {
            background: #0d0628;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #ffbb2e;
            color: #ffe49e;
        }

        .question-card {
            background: #fee3a2;
            padding: 20px 15px;
            border-radius: 120px;
            border: 6px solid #ff8321;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #a63f0e, inset 0 -5px 15px #ffffbb;
        }
        .big-equation {
            font-size: 6rem;
            font-weight: 800;
            color: #1f3a3f;
            text-shadow: 5px 5px 0 #f5b457;
            line-height: 1.3;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 15px 0 10px;
            align-items: center;
        }
        .answer-input {
            font-size: 3.5rem;
            width: 210px;
            text-align: center;
            border: 6px solid #ff7b2b;
            border-radius: 70px;
            background: #fefad0;
            font-weight: bold;
            color: #0a3b3b;
            padding: 5px 15px;
            outline: none;
            box-shadow: 0 9px 0 #a3510e, inset 0 2px 15px #ffc107;
        }
        .check-btn {
            background: #f04f30;
            border: none;
            font-size: 2.8rem;
            padding: 15px 40px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            text-shadow: 4px 4px 0 #8b280c;
            box-shadow: 0 10px 0 #952d0c;
            cursor: pointer;
            border: 4px solid #ffbc6e;
            transition: 0.06s linear;
        }
        .check-btn:active { transform: translateY(7px); box-shadow: 0 3px 0 #952d0c; }
        .message {
            font-size: 2.2rem;
            min-height: 5rem;
            padding: 15px;
            background: #c2e0c2;
            border-radius: 50px;
            margin: 20px 0 10px;
            border: 4px solid #3d9e4b;
            color: #145214;
            font-weight: bold;
            box-shadow: inset 0 -4px 0 #6fa86f;
        }
        .next-btn {
            background: #2d7f9e;
            border: none;
            font-size: 2.4rem;
            padding: 12px 45px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-shadow: 3px 3px 0 #124c66;
            box-shadow: 0 9px 0 #124f66;
            cursor: pointer;
            border: 4px solid #7ad0f0;
            margin-top: 10px;
            transition: 0.06s linear;
        }
        .next-btn:active { transform: translateY(6px); box-shadow: 0 3px 0 #124f66; }
        .next-btn:disabled { opacity: 0.5; pointer-events: none; }
        footer { margin-top: 25px; font-size: 1.8rem; color: #cc6d1c; }
    </style>
</head>
<body class="theme-avengers" id="mainBody">
    <div class="game-box">
        <!-- theme switcher row -->
        <div class="theme-chooser">
            <button class="theme-btn avengers" data-theme="avengers">🦸 Avengers</button>
            <button class="theme-btn spider" data-theme="spider">🕷️ Spider-Man</button>
            <button class="theme-btn paw" data-theme="pawpatrol">🐾 Paw Patrol</button>
            <button class="theme-btn minecraft" data-theme="minecraft">⛏️ Minecraft</button>
        </div>

        <!-- photo bar (logo changes with theme) -->
        <div class="avengers-photo-bar" id="themeHeader">
            <div class="photo-frame">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23f5d742' stroke='%23ff9f1c' stroke-width='4' /%3E%3Ccircle cx='35' cy='40' r='6' fill='%23231209' /%3E%3Ccircle cx='65' cy='40' r='6' fill='%23231209' /%3E%3Cpath d='M35 65 Q50 80,65 65' stroke='%238a4b1f' stroke-width='6' fill='none' stroke-linecap='round' /%3E%3Ctext x='28' y='94' font-size='18' fill='%23993333'%3E👦%3C/text%3E%3C/svg%3E"
                     alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="theme-logo" id="themeLogo">AVENGERS</div>
        </div>

        <!-- score + streak -->
        <div class="stats">
            <div class="score" id="scoreDisplay">🏆 0</div>
            <div class="streak" id="streakDisplay">🔥 0</div>
        </div>

        <!-- math area -->
        <div class="question-card">
            <div class="big-equation" id="questionText">2 + 2</div>
        </div>

        <div class="input-area">
            <input type="number" id="answerInput" class="answer-input" placeholder="?" inputmode="numeric">
            <button class="check-btn" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message" id="messageBox">🦸 Ready, Lesedi?</div>
        <button class="next-btn" id="nextBtn" disabled> ➡️ Next</button>
        <footer>⭐ choose your theme ⭐</footer>
    </div>

    <script>
        (function() {
            // ----- sound effects using Web Audio API (gentle, no external files) -----
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new AudioContext();
            }

            function playCorrectSound() {
                try {
                    initAudio();
                    if (!audioCtx) return;
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 880; // A5
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain).connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } catch (e) { /* mobile might need user interaction first */ }
            }

            function playWrongSound() {
                try {
                    initAudio();
                    if (!audioCtx) return;
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 340;
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.connect(gain).connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } catch (e) {}
            }

            function playStreakSound() {
                try {
                    initAudio();
                    if (!audioCtx) return;
                    const now = audioCtx.currentTime;
                    // little fanfare: two notes
                    const osc1 = audioCtx.createOscillator();
                    const gain1 = audioCtx.createGain();
                    osc1.frequency.value = 1046.5; // C6
                    gain1.gain.setValueAtTime(0.2, now);
                    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc1.connect(gain1).connect(audioCtx.destination);
                    osc1.start(now);
                    osc1.stop(now + 0.15);

                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.frequency.value = 1318.5; // E6
                    gain2.gain.setValueAtTime(0.2, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc2.connect(gain2).connect(audioCtx.destination);
                    osc2.start(now + 0.1);
                    osc2.stop(now + 0.3);
                } catch (e) {}
            }

            // Game state
            let currentQuestion = { text: '2 + 2', answer: 4 };
            let score = 0;
            let streak = 0;
            let awaitingNext = false;
            let firstLoad = true;
            let currentTheme = 'avengers'; // default

            // DOM elements
            const bodyEl = document.getElementById('mainBody');
            const themeLogo = document.getElementById('themeLogo');
            const themeHeader = document.getElementById('themeHeader');
            const questionEl = document.getElementById('questionText');
            const answerInput = document.getElementById('answerInput');
            const checkBtn = document.getElementById('checkBtn');
            const nextBtn = document.getElementById('nextBtn');
            const messageBox = document.getElementById('messageBox');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const streakDisplay = document.getElementById('streakDisplay');

            // Theme definitions
            const themes = {
                avengers: {
                    bodyClass: 'theme-avengers',
                    logoText: 'AVENGERS',
                    headerBg: 'linear-gradient(145deg, #1f2c56, #0e1a42)',
                    borderColor: '#f5c542',
                },
                spider: {
                    bodyClass: 'theme-spider',
                    logoText: 'SPIDER-MAN',
                    headerBg: 'linear-gradient(145deg, #2c0f1a, #1f2a44)',
                    borderColor: '#e63946',
                },
                pawpatrol: {
                    bodyClass: 'theme-pawpatrol',
                    logoText: 'PAW PATROL',
                    headerBg: 'linear-gradient(145deg, #3b9ae1, #faca2e)',
                    borderColor: '#f55c3a',
                },
                minecraft: {
                    bodyClass: 'theme-minecraft',
                    logoText: 'MINECRAFT',
                    headerBg: 'linear-gradient(145deg, #4f7a3b, #2b3d1c)',
                    borderColor: '#8bae6d',
                }
            };

            function applyTheme(themeId) {
                currentTheme = themeId;
                const theme = themes[themeId];
                bodyEl.className = theme.bodyClass;
                themeLogo.innerText = theme.logoText;
                themeHeader.style.background = theme.headerBg;
                themeHeader.style.borderColor = theme.borderColor;
                // also change logo border maybe
                document.querySelector('.theme-logo').style.background = 
                    themeId === 'spider' ? '#e63946' : 
                    themeId === 'pawpatrol' ? '#f5d742' : 
                    themeId === 'minecraft' ? '#6b8f4c' : '#e62529';
            }

            // theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const theme = e.target.dataset.theme;
                    applyTheme(theme);
                });
            });

            // Generate question (remains same)
            function generateRandomQuestion() {
                const usePlus = Math.random() >= 0.5;
                let a, b, ans;
                if (usePlus) {
                    a = Math.floor(Math.random() * 10) + 2; // 2-11
                    b = Math.floor(Math.random() * 8) + 2;  // 2-9
                    ans = a + b;
                    return { text: `${a} + ${b}`, answer: ans };
                } else {
                    a = Math.floor(Math.random() * 8) + 6;  // 6-13
                    b = Math.floor(Math.random() * (a-2)) + 2; 
                    if (a - b <= 0) b = a - 2;
                    ans = a - b;
                    return { text: `${a} - ${b}`, answer: ans };
                }
            }

            function refreshStatsUI() {
                scoreDisplay.innerText = `🏆 ${score}`;
                streakDisplay.innerText = `🔥 ${streak}`;
            }

            function setNewQuestion() {
                const newQ = generateRandomQuestion();
                currentQuestion = newQ;
                questionEl.innerText = newQ.text;
                answerInput.value = '';
                answerInput.focus();
                awaitingNext = false;
                nextBtn.disabled = true;
                checkBtn.disabled = false;
                if (firstLoad) {
                    messageBox.innerHTML = '🦸 Ready, Lesedi?';
                    firstLoad = false;
                } else {
                    messageBox.innerHTML = '✨ new challenge!';
                }
            }

            // answer checking with sounds
            function handleCheck() {
                if (awaitingNext) {
                    messageBox.innerHTML = '➡️ press NEXT for more fun!';
                    return;
                }
                const raw = answerInput.value.trim();
                if (raw === '') {
                    messageBox.innerHTML = '🔢 type a number!';
                    return;
                }
                const num = Number(raw);
                if (isNaN(num)) {
                    messageBox.innerHTML = '❌ need a number, hero!';
                    return;
                }

                if (num === currentQuestion.answer) {
                    // correct! play sound
                    playCorrectSound();
                    streak += 1;
                    score += 1;
                    refreshStatsUI();

                    let praise = '';
                    if (currentTheme === 'spider') praise = '🕷️ SPECTACULAR! web-slinging math!';
                    else if (currentTheme === 'pawpatrol') praise = '🐾 RUFF-RUFF! correct!';
                    else if (currentTheme === 'minecraft') praise = '⛏️ CRAFT-Y answer! +1';
                    else praise = '✅ AVENGERS ASSEMBLE!';

                    messageBox.innerHTML = `✅ ${praise}`;
                    
                    if (streak >= 3) {
                        playStreakSound(); // bonus fanfare
                        messageBox.innerHTML += ' 🔥🔥 STREAK!';
                    }

                    awaitingNext = true;
                    nextBtn.disabled = false;
                    checkBtn.disabled = true;
                } else {
                    playWrongSound();
                    streak = 0;
                    refreshStatsUI();
                    messageBox.innerHTML = `🤔 try again, Lesedi!`;
                    answerInput.select();
                }
            }

            function handleNext() {
                if (awaitingNext) setNewQuestion();
            }

            // Enter key
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCheck();
                }
            });

            checkBtn.addEventListener('click', handleCheck);
            nextBtn.addEventListener('click', handleNext);

            // limit input length
            answerInput.addEventListener('input', function() {
                if (this.value.length > 2) this.value = this.value.slice(0,2);
            });

            // init first question & theme
            setNewQuestion();
            refreshStatsUI();
            applyTheme('avengers');

            // Unlock audio on first user interaction (mobile browsers)
            document.body.addEventListener('touchstart', function once() {
                initAudio();
                document.body.removeEventListener('touchstart', once);
            }, { once: true });
            document.body.addEventListener('click', function onceClick() {
                initAudio();
                document.body.removeEventListener('click', onceClick);
            }, { once: true });

            // Photo replacement instruction
            console.log("Add Lesedi's photo: document.getElementById('lesediPhoto').src = 'your-image.jpg'");
        })();
    </script>
</body>
</html>
