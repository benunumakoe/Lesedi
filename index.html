<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesedi's Math Game with Certificate</title>
    <style>
        /* ALL YOUR EXISTING STYLES PLUS THESE */
        .certificate-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s;
        }
        
        .certificate-card {
            background: white;
            padding: 40px 30px;
            border-radius: 80px;
            border: 20px solid gold;
            text-align: center;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 0 100px gold;
            position: relative;
            background-image: linear-gradient(135deg, #fff9e6, #fff0d0);
        }
        
        .certificate-stars {
            font-size: 3rem;
            letter-spacing: 10px;
            color: gold;
        }
        
        .certificate-title {
            font-size: 4rem;
            color: #1e3c72;
            margin: 10px 0;
            text-shadow: 2px 2px 0 #ffd700;
        }
        
        .certificate-to {
            font-size: 2.5rem;
            color: #555;
        }
        
        .certificate-name {
            font-size: 5rem;
            color: #e23636;
            margin: 10px 0;
            border-bottom: 5px dashed gold;
            border-top: 5px dashed gold;
            padding: 15px;
        }
        
        .certificate-points {
            font-size: 6rem;
            color: gold;
            text-shadow: 3px 3px 0 #b8860b;
            margin: 15px 0;
        }
        
        .certificate-footer {
            font-size: 2rem;
            color: #2c3e50;
            margin: 20px 0 15px;
        }
        
        .certificate-print {
            background: #4caf50;
            color: white;
            font-size: 2rem;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32;
        }
        
        .certificate-close {
            background: #f04f30;
            color: white;
            font-size: 2rem;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #952d0c;
        }
        
        .certificate-btn {
            background: gold;
            font-size: 1.8rem;
            padding: 10px 25px;
            border-radius: 50px;
            border: 4px solid orange;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0); }
            100% { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <div class="game-box">
        <!-- SOUND BUTTON -->
        <div class="sound-button" id="soundBtn">🔊 TAP HERE FOR SOUND</div>

        <!-- THEME BUTTONS -->
        <div class="theme-buttons">
            <button class="theme-btn avengers-btn" onclick="changeTheme('avengers')">🦸 AVENGERS</button>
            <button class="theme-btn spider-btn" onclick="changeTheme('spider')">🕷️ SPIDER-MAN</button>
            <button class="theme-btn roblox-btn" onclick="changeTheme('roblox')">🎮 ROBLOX</button>
            <button class="theme-btn minecraft-btn" onclick="changeTheme('minecraft')">⛏️ MINECRAFT</button>
        </div>

        <!-- LESEDI'S PHOTO -->
        <div class="photo-area">
            <div class="photo-frame">
                <img src="lesedi-face.jpg" alt="Lesedi" id="lesediPhoto">
            </div>
            <div class="photo-text">LESEDI ⭐</div>
        </div>

        <!-- THEME DISPLAY -->
        <div class="theme-show">
            <span class="theme-icon" id="themeIcon">🦸</span>
            <div class="theme-title" id="themeTitle" style="background: #e23636;">AVENGERS</div>
        </div>

        <!-- SCORES -->
        <div class="stats">
            <div class="stat-box" id="scoreDisplay">🏆 0</div>
            <div class="stat-box" id="streakDisplay">🔥 0</div>
        </div>

        <!-- QUESTION -->
        <div class="question-box">
            <div class="question-text" id="questionText">2 + 2</div>
        </div>

        <!-- ANSWER -->
        <div class="input-row">
            <input type="number" id="answerInput" class="number-input" placeholder="?">
            <button class="ok-button" id="checkBtn">✔️ OK</button>
        </div>

        <div class="message-area" id="messageBox">Welcome Lesedi! 👋</div>
        <button class="next-button" id="nextBtn" disabled>➡️ NEXT</button>
        
        <!-- CERTIFICATE BUTTON (optional) -->
        <button class="certificate-btn" onclick="showCertificate()">🏆 CLAIM YOUR CERTIFICATE 🏆</button>
    </div>

    <script>
        // ALL YOUR EXISTING SCRIPT CODE HERE...
        let soundEnabled = false;
        let audioCtx = null;
        
        document.getElementById('soundBtn').onclick = function() {
            soundEnabled = true;
            this.innerHTML = '🔊 SOUND READY! 🎉';
            this.style.background = '#2ecc71';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        };

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 340;
            gain.gain.value = 0.15;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playStreak() {
            if (!soundEnabled || !audioCtx) return;
            audioCtx.resume();
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.frequency.value = 1046.5;
            gain1.gain.value = 0.2;
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc1.connect(gain1).connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.15);
            
            let osc2 = audioCtx.createOscillator();
            let gain2 = audioCtx.createGain();
            osc2.frequency.value = 1318.5;
            gain2.gain.value = 0.2;
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.connect(gain2).connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.1);
            osc2.stop(audioCtx.currentTime + 0.3);
        }

        // GAME VARIABLES
        let score = 0;
        let streak = 0;
        let currentAnswer = 4;
        let waitingForNext = false;

        // GET ELEMENTS
        const themeIcon = document.getElementById('themeIcon');
        const themeTitle = document.getElementById('themeTitle');
        const questionEl = document.getElementById('questionText');
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const messageEl = document.getElementById('messageBox');
        const scoreEl = document.getElementById('scoreDisplay');
        const streakEl = document.getElementById('streakDisplay');

        // CHANGE THEME
        window.changeTheme = function(theme) {
            document.body.style.background = 
                theme === 'avengers' ? '#1e3c72' :
                theme === 'spider' ? '#1a1a2e' :
                theme === 'roblox' ? '#8b0000' : '#8B5A2B';
            
            if (theme === 'avengers') {
                themeIcon.innerText = '🦸';
                themeTitle.innerText = 'AVENGERS';
                themeTitle.style.background = '#e23636';
                messageEl.innerText = '🦸 Assemble Lesedi!';
            } else if (theme === 'spider') {
                themeIcon.innerText = '🕷️';
                themeTitle.innerText = 'SPIDER-MAN';
                themeTitle.style.background = '#02458b';
                messageEl.innerText = '🕷️ Go Spider-Lesedi!';
            } else if (theme === 'roblox') {
                themeIcon.innerText = '🎮';
                themeTitle.innerText = 'ROBLOX';
                themeTitle.style.background = '#cc0000';
                messageEl.innerText = '🎮 Level up Lesedi!';
            } else if (theme === 'minecraft') {
                themeIcon.innerText = '⛏️';
                themeTitle.innerText = 'MINECRAFT';
                themeTitle.style.background = '#4caf50';
                messageEl.innerText = '⛏️ Craft on Lesedi!';
            }
        };

        // NEW QUESTION
        function newQuestion() {
            let usePlus = Math.random() > 0.5;
            let a, b;
            
            if (usePlus) {
                a = Math.floor(Math.random() * 9) + 2;
                b = Math.floor(Math.random() * 8) + 2;
                currentAnswer = a + b;
                questionEl.innerText = a + ' + ' + b;
            } else {
                a = Math.floor(Math.random() * 8) + 5;
                b = Math.floor(Math.random() * (a-2)) + 2;
                currentAnswer = a - b;
                questionEl.innerText = a + ' - ' + b;
            }
            
            answerInput.value = '';
            waitingForNext = false;
            nextBtn.disabled = true;
            checkBtn.disabled = false;
        }

        // ===== CERTIFICATE FUNCTION =====
        window.showCertificate = function() {
            // Get current theme colors
            const themeColor = themeTitle.style.background;
            
            // Create certificate HTML
            const certificateHTML = `
                <div class="certificate-popup" onclick="if(event.target===this) this.remove()">
                    <div class="certificate-card">
                        <div class="certificate-stars">⭐ ⭐ ⭐</div>
                        <h1 class="certificate-title">🏆 CERTIFICATE OF EXCELLENCE 🏆</h1>
                        <p class="certificate-to">Presented to</p>
                        <h2 class="certificate-name">LESEDI</h2>
                        <p class="certificate-to">For achieving</p>
                        <div class="certificate-points">${score} POINTS!</div>
                        <p class="certificate-footer">⭐ Math Superstar ⭐</p>
                        <p style="font-size: 1.8rem; color: ${themeColor}; margin: 10px 0;">${themeTitle.innerText} CHAMPION!</p>
                        <div>
                            <button class="certificate-print" onclick="window.print()">🖨️ PRINT</button>
                            <button class="certificate-close" onclick="this.closest('.certificate-popup').remove()">✖️ CLOSE</button>
                        </div>
                        <p style="font-size: 1.2rem; color: gray; margin-top: 15px;">${new Date().toLocaleDateString()}</p>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', certificateHTML);
        };

        // CHECK ANSWER WITH CERTIFICATE CHECK
        checkBtn.onclick = function() {
            if (waitingForNext) {
                messageEl.innerText = '👉 Press NEXT!';
                return;
            }
            
            let val = answerInput.value.trim();
            if (val === '') {
                messageEl.innerText = '🔢 Type a number!';
                return;
            }
            
            let num = Number(val);
            if (isNaN(num)) {
                messageEl.innerText = '❌ Numbers only!';
                return;
            }
            
            if (num === currentAnswer) {
                playCorrect();
                
                streak++;
                score++;
                
                let msg = '✅ CORRECT!';
                if (streak >= 3) {
                    playStreak();
                    msg += ' 🔥 STREAK!';
                }
                messageEl.innerText = msg;
                
                scoreEl.innerText = '🏆 ' + score;
                streakEl.innerText = '🔥 ' + streak;
                
                // CHECK FOR 100 POINTS CERTIFICATE
                if (score === 100 || score === 200 || score === 500) {
                    setTimeout(showCertificate, 500);
                }
                
                waitingForNext = true;
                nextBtn.disabled = false;
                checkBtn.disabled = true;
            } else {
                playWrong();
                
                streak = 0;
                streakEl.innerText = '🔥 0';
                messageEl.innerText = '🤔 Try again!';
                answerInput.select();
            }
        };

        // NEXT BUTTON
        nextBtn.onclick = newQuestion;

        // ENTER KEY
        answerInput.onkeypress = function(e) {
            if (e.key === 'Enter') checkBtn.click();
        };

        // START GAME
        newQuestion();
    </script>
</body>
</html>
